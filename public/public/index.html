<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Livre - Web Proxy</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Barra de Navegação Superior (Estilo Browser) -->
        <header class="browser-bar">
            <div class="window-controls">
                <span class="dot close"></span>
                <span class="dot minimize"></span>
                <span class="dot maximize"></span>
            </div>
            
            <form id="url-form" class="address-bar-container">
                <div class="input-wrapper">
                    <svg class="lock-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                    <input type="text" id="url-input" placeholder="Pesquise ou digite uma URL (ex: tiktok.com)" autocomplete="off" />
                </div>
                <button type="submit" class="go-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                        <polyline points="12 5 19 12 12 19"></polyline>
                    </svg>
                </button>
            </form>
        </header>

        <!-- Área de Conteúdo (Iframe) -->
        <main class="content-area">
            <div id="welcome-screen" class="welcome-screen">
                <div class="hero-content">
                    <div class="logo-wrapper">
                        <div class="logo-glow"></div>
                        <h1>Acesso <span>Livre</span></h1>
                    </div>
                    <p>Navegue sem limites. Privacidade, velocidade e acesso desbloqueado em um só lugar.</p>
                    
                    <div class="shortcuts-container">
                        <p class="shortcuts-title">Acesso Rápido</p>
                        <div class="shortcuts-grid">
                            <button class="shortcut-btn" data-url="tiktok.com">
                                <div class="shortcut-icon" style="background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
                                        <path d="M9 12a4 4 0 1 0 4 4V4a5 5 0 0 0 5 5"></path>
                                    </svg>
                                </div>
                                <span>TikTok</span>
                            </button>
                            <button class="shortcut-btn" data-url="boosteroid.com">
                                <div class="shortcut-icon" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
                                        <rect x="2" y="6" width="20" height="12" rx="2"></rect>
                                        <circle cx="16" cy="12" r="2"></circle>
                                        <path d="M6 12h4"></path>
                                        <path d="M8 10v4"></path>
                                    </svg>
                                </div>
                                <span>Boosteroid</span>
                            </button>
                            <button class="shortcut-btn" data-url="crunchyroll.com">
                                <div class="shortcut-icon" style="background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
                                        <polygon points="5 3 19 12 5 21 5 3"></polygon>
                                    </svg>
                                </div>
                                <span>Crunchyroll</span>
                            </button>
                            <button class="shortcut-btn" data-url="discord.com">
                                <div class="shortcut-icon" style="background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%);">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
                                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                                    </svg>
                                </div>
                                <span>Discord</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
            <iframe id="proxy-frame" src="" frameborder="0" allowfullscreen></iframe>
            
            <div id="loader" class="loader-container hidden">
                <div class="premium-loader">
                    <div class="circle"></div>
                    <div class="circle"></div>
                    <div class="circle"></div>
                </div>
            </div>
        </main>
    </div>

    <script src="main.js"></script>
</body>
</html>
